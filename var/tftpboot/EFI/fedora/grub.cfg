function load_video {
	insmod efi_gop
	insmod efi_uga
	insmod video_bochs
	insmod video_cirrus
	insmod all_video
}

load_video
set gfxpayload=keep
insmod gzio

menuentry 'Exit' {
        exit
}

menuentry 'Fedora 34 Installer'  --class fedora --class gnu-linux --class gnu --class os {
	linuxefi f34/vmlinuz ip=dhcp inst.repo=https://www.mirrorservice.org/sites/dl.fedoraproject.org/pub/fedora/linux/releases/34/Everything/x86_64/os/
	initrdefi f34/initrd.img
}
