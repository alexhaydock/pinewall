stages:
  - build
  - release

image-build:
  # Use the official docker image.
  image: docker:latest
  stage: build
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  # Default branch leaves tag empty (= latest tag)
  # All other branches are tagged with the escaped branch name (commit ref slug)
  script:
    - docker build --pull -f Dockerfile_image_x86 -t pinewall-x86 .
    - docker run --rm -it -v "$(pwd)/images:/tmp/images:Z" pinewall-x86 ./imagebuild.sh

image-push:
  image: curlimages/curl:latest
  stage: release
  # Keep all the untracked files generated by the build stage since this contains our actual ISO
  dependencies: 
    - image-build
  script:
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file images/alpine-pinewall_x86-v3.14-x86_64.iso "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/Pinewall/$(date "+%Y-%m-%d")/pinewall-x86_64-$(date "+%Y-%m-%d").iso"'
  # Only run the actual upload stage if we're running on the master branch
  only:
    refs:
      - master
