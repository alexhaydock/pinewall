# Dependabot doesn't support apko so this is "Depinedabot"
# which is just the core update-lockfile-and-open-PR
# logic from Dependabot implemented directly

name: "Depinedabot: Check for apko lockfile updates"

on:
  schedule:
    - cron: "0 3 * * *"  # Run daily at 3AM
  workflow_dispatch:

jobs:
  update-lock:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch my custom patched apko with lockfile support
        run: |
          curl -sL https://github.com/alexhaydock/apko/releases/download/b87f3ba-with-lockfile/apko -o apko
          sudo mv -v apko /usr/local/bin/apko
          sudo chmod +x /usr/local/bin/apko

      - name: Run apko lock
        working-directory: image
        run: |
          apko lock --output ../apko.lock pinewall.yaml

      - name: Check for changes
        id: diff
        run: |
          git add apko.lock
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with gh
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B depinedabot

          git add apko.lock
          git commit -m "Depinedabot: Update apko.lock"

          git push -u origin depinedabot --force

          # Check if PR already exists
          PR_NUMBER=$(gh pr list \
            --head depinedabot \
            --base master \
            --state open \
            --json number \
            -q '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            # Double-check there is actually a diff before creating PR
            if [ "$(git diff origin/master...depinedabot -- apko.lock)" ]; then
              gh pr create \
                --title "Depinedabot: Update apko.lock" \
                --body "Automated update of apko.lock" \
                --head depinedabot \
                --base master
            else
              echo "No diff vs master. Skipping PR creation."
            fi
          else
            echo "PR already exists: #$PR_NUMBER"
          fi
