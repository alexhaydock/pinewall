# Enable IPv4 forwarding
net.ipv4.ip_forward = 1

# Enable strict reverse path filtering (drops martians)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets to dmesg
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable IPv6 Forwarding
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Accept router advertisements by default
# (No matter what I try, disabling this seems to break stuff - particularly
# the PPP interface which seems unable to set itself up with IPv6 properly
# with this set to "0").
net.ipv6.conf.all.accept_ra = 2
net.ipv6.conf.default.accept_ra = 2

# Do not autoconfigure IPv6 SLAAC addresses for any interface
# (This is quite important for us since we're a router).
net.ipv6.conf.all.autoconf = 0
net.ipv6.conf.default.autoconf = 0

# We are a router so disable RFC3041 privacy extensions
# (This is important since we need our IPv6 ddress on each interface to
# be predictable so we can serve it as our RDNSS address for IPv6
# clients in our radvd config).
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

# Increase timeout on "established" UDP connection lengths from 120 to 900
# This seems to help with what I can only assume is HTTP/3 or QUIC on Facebook's
# app - and probably will help with more when more apps start adopting it
net.netfilter.nf_conntrack_udp_timeout_stream = 900
