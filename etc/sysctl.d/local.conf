# Enable IPv4 forwarding
net.ipv4.ip_forward = 1

# Enable strict reverse path filtering (drops martians)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets to dmesg
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable IPv6 Forwarding
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Accept router Advertisments
# We need this for the ISP to send us our gateway
# address, and to configure the IPv6 addresses for
# our VLAN subnets via SLAAC
net.ipv6.conf.all.accept_ra = 2
net.ipv6.conf.default.accept_ra = 2

# We are a router so disable temporary addresses
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

# Increase timeout on "established" UDP connection lengths from 120 to 900
# This seems to help with what I can only assume is HTTP/3 or QUIC on Facebook's
# app - and probably will help with more when more apps start adopting it
net.netfilter.nf_conntrack_udp_timeout_stream = 900