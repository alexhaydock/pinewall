# /etc/unbound/unbound.conf

# Configure Unbound server settings
server:
    # Logging settings
    # We need to create this file beforehand and set it
    # to be owned by the "unbound" user, otherwise
    # unbound won't be able to write to it.
    logfile: /var/log/unbound.log
    verbosity: 1

    # Daemon settings
    num-threads: 2
    username: "unbound"

    # Listening settings
    interface: 0.0.0.0
    interface: ::0
    port: 53

    # Prefer IPv6 for sending queries to upstream servers
    prefer-ip6: yes
    prefer-ip4: no

    # Allow access from loopback and link-local
    access-control: 127.0.0.8/8 allow
    access-control: fc00::/7 allow
    access-control: ::1/128 allow

    # Allow access on LAN from addresses within my IPv6 /48
    # See: https://control.aa.net.uk
    access-control: 2001:8b0:dd00::/48 allow

    # Allow access on LAN from RFC1918 ranges
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    # Certs and validation paths
    root-hints: "/usr/share/dns-root-hints/named.root"
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"
    trust-anchor-file: "/usr/share/dnssec-root/trusted-key.key"

    # Don't reply to queries about our Unbound version etc
    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes

    # Block DNS rebinding attacks by declaring ranges we don't
    # want to see in DNS replies from the internet
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
    private-address: ::ffff:0:0/96

    # Allow prefetching cached entries before they expire
    prefetch: yes
    prefetch-key: yes

    # Define local zones
    # We use home.arpa for our local search domain because it's
    # reserved for this exact purpose as per RFC 8375
    local-zone: "home.arpa." transparent

    local-data-ptr: "10.10.10.10 nas.home.arpa"
    local-data: "nas.home.arpa. A 10.10.10.10"

# Use Andrews and Arnold's customer only (non-DoT) upstream
forward-zone:
    name: "."
    forward-addr: 2001:8b0::2020
    forward-addr: 2001:8b0::2021
    forward-addr: 217.169.20.20
    forward-addr: 217.169.20.21

