# Force IPv4-only resolution via Cloudflare DNS
# We need to set IPv6 off otherwise Nginx tries to use IPv6 to contact the upstream server
resolver 1.1.1.1 1.0.0.1 ipv6=off;

# Proxy settings
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100g
inactive=182d use_temp_path=off;

upstream mirrorservice {
    server www.mirrorservice.org:443;
    keepalive 16;
}

server {
    listen       80;
    server_name  _;

    # Proxy most requests to our service directly to the upstream (no caching)
    location / {
        proxy_pass                      https://mirrorservice;
        proxy_set_header                Host www.mirrorservice.org;
    }

    # Proxy requests for known package files to the upstream (and also cache them on disk)
    location ~* \.(rpm|deb|apk)$ {
        proxy_pass                      https://mirrorservice;
        proxy_set_header                Host www.mirrorservice.org;

        # This needs to be enabled or Nginx doesn't end up caching anything properly
        proxy_buffering                 on;

        proxy_cache                     my_cache;
        proxy_cache_background_update   on;
        proxy_cache_lock                on;
        proxy_cache_revalidate          on;

        # Fix timeout errors
        # https://stackoverflow.com/a/54605107
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Deliver stale content if any of the errors below are reached (timeout, HTTP 50x, etc)
        proxy_cache_use_stale           error timeout updating http_500 http_502 http_503 http_504;

        # Ignore Cache-Control headers from upstream and cache for a max of 182 days (valid requests only).
        proxy_cache_valid 200 206       182d;
        proxy_ignore_headers            Cache-Control;

        # File must be fetched a minimum of 1 time before Nginx will cache it.
        proxy_cache_min_uses            1;
    }
}
